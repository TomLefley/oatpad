name: Lint PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  conventional:
    name: Conventional title
    runs-on: ubuntu-latest
    steps:
      # PR titles double as squash-merge commit subjects, so this gate
      # is what keeps `main` conventional and release-please able to
      # detect bumps.
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
