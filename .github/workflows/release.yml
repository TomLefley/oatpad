name: Release

on:
  # release-please creates the GitHub Release when its release PR
  # merges. GitHub deliberately suppresses the `created` event for
  # API-created drafts, so we trigger on `published` and have
  # release-please publish directly — the merge of the release PR is
  # the human review gate. workflow_dispatch is the manual escape
  # hatch for rebuilds against an existing tag.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Will be created if missing.'
        required: true

jobs:
  release:
    name: Build macOS bundle
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Build against the released tag, not whichever branch
          # workflow_dispatch defaults to. For the release event,
          # github.ref is already the tag.
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src -> target

      - name: Install dependencies
        run: npm ci

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (minisign) — verifies the .app.tar.gz
          # bundle the in-app updater downloads. See README "Updates".
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing (Apple) — `tauri-action` decodes the
          # base64 .p12 into a temporary keychain, runs codesign, then
          # nukes the keychain. Required so Santa-managed installs and
          # the in-app updater's relaunch step both see a stable
          # signing identity.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: 'Oatpad ${{ steps.tag.outputs.name }}'
          # release-please already created the release as published
          # by the time this workflow fires (release: published
          # trigger). tauri-action attaches artifacts to the existing
          # release and leaves it published.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
