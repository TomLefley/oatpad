name: Release

on:
  # release-please creates the GitHub Release (as a draft, per its
  # config) when its release PR merges; we attach the macOS bundle to
  # that release. workflow_dispatch is the manual escape hatch for
  # rebuilds against an existing tag.
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Will be created if missing.'
        required: true

jobs:
  release:
    name: Build macOS bundle
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Build against the released tag, not whichever branch
          # workflow_dispatch defaults to. For the release event,
          # github.ref is already the tag.
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src -> target

      - name: Install dependencies
        run: npm ci

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Patch releases (vX.Y.Z where Z > 0) auto-publish — they're
      # bug-fix-only and the in-app updater should pick them up
      # without a human in the loop. Major/minor releases (vX.Y.0) and
      # anything with a pre-release suffix stay as drafts so we can
      # review notes and assets before flipping the switch.
      - name: Decide draft vs auto-publish
        id: draft
        run: |
          tag="${{ steps.tag.outputs.name }}"
          semver="${tag#v}"
          if [[ "$semver" =~ ^[0-9]+\.[0-9]+\.[1-9][0-9]*$ ]]; then
            echo "is_draft=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_draft=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (minisign) — verifies the .app.tar.gz
          # bundle the in-app updater downloads. See README "Updates".
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing (Apple) — `tauri-action` decodes the
          # base64 .p12 into a temporary keychain, runs codesign, then
          # nukes the keychain. Required so Santa-managed installs and
          # the in-app updater's relaunch step both see a stable
          # signing identity.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: 'Oatpad ${{ steps.tag.outputs.name }}'
          releaseDraft: ${{ steps.draft.outputs.is_draft }}
          prerelease: false
          args: --target universal-apple-darwin
