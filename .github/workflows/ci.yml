name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Run app tests
        run: npm test

      - name: Install MCP dependencies
        working-directory: mcp
        run: npm ci

      - name: Run MCP tests
        working-directory: mcp
        run: npm test
