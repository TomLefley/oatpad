name: Feature request
description: Suggest an idea or improvement for Oatpad
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what gets in the way today?

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related issues, etc.
