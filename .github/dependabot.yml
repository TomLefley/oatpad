version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Conventional-commit prefixes so release-please reads each merge
    # as a patch-bumping change.
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # Bump Tauri stack deliberately — major upgrades touch the Rust side too
      - dependency-name: '@tauri-apps/*'
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: /mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # mcp is build-only tooling — defer typescript majors to manual review
      - dependency-name: 'typescript'
        update-types: [version-update:semver-major]

  - package-ecosystem: cargo
    directory: /src
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: tauri*
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    groups:
      actions:
        patterns: ['*']
